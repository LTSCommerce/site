name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - 'cloudflare-workers/lts-site-proxy/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: cloudflare-workers/lts-site-proxy/package-lock.json

      - name: Install dependencies
        working-directory: cloudflare-workers/lts-site-proxy
        run: npm ci

      - name: Build worker
        working-directory: cloudflare-workers/lts-site-proxy
        run: npm run build

      - name: Deploy to Cloudflare
        working-directory: cloudflare-workers/lts-site-proxy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
